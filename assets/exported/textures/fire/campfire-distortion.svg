<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="largeLicks">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.13" numOctaves="5" seed="41"/>
      <feColorMatrix type="matrix" values="1.35 0 0 0 -0.15  0 1.35 0 0 -0.15  0 0 1.35 0 -0.15  0 0 0 1 0"/>
    </filter>
    <linearGradient id="verticalBias" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#777"/>
      <stop offset="0.45" stop-color="#c8c8c8"/>
      <stop offset="1" stop-color="#333"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#verticalBias)"/>
  <rect width="256" height="256" filter="url(#largeLicks)" opacity="0.72"/>
</svg>
