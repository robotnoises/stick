<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="ripples">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.11" numOctaves="4" seed="23"/>
      <feColorMatrix type="matrix" values="1.35 0 0 0 -0.15  0 1.35 0 0 -0.15  0 0 1.35 0 -0.15  0 0 0 1 0"/>
    </filter>
    <linearGradient id="bias" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#777"/>
      <stop offset="0.5" stop-color="#c8c8c8"/>
      <stop offset="1" stop-color="#555"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bias)"/>
  <rect width="256" height="256" filter="url(#ripples)" opacity="0.62"/>
</svg>
